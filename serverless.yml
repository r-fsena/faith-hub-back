          cors: true

  getPartilhas:
    handler: src/functions/partilhas.getPartilhas
    events:
      - httpApi:
          method: GET
          path: /partilhas
          cors: true

  createPartilha:
    handler: src/functions/partilhas.createPartilha
    events:
      - httpApi:
          method: POST
          path: /partilhas
          cors: true

  togglePartilha:
    handler: src/functions/partilhas.togglePartilha
    events:
      - httpApi:
          method: PUT
          path: /partilhas/{id}/toggle
          cors: true

  deletePartilha:
    handler: src/functions/partilhas.deletePartilha
    events:
      - httpApi:
          method: DELETE
          path: /partilhas/{id}
          cors: true

  getEvents:
    handler: src/functions/events.getEvents
    events:
      - httpApi:
          method: GET
          path: /events
          cors: true

  getEventById:
    handler: src/functions/events.getEventById
    events:
      - httpApi:
          method: GET
          path: /events/{id}
          cors: true

  createOrUpdateEvent:
    handler: src/functions/events.createOrUpdateEvent
    events:
      - httpApi:
          method: POST
          path: /events
          cors: true

  deleteEvent:
    handler: src/functions/events.deleteEvent
    events:
      - httpApi:
          method: DELETE
          path: /events/{id}
          cors: true

  createMockEvent:
    handler: src/functions/events.createMockEvent
    events:
      - httpApi:
          method: POST
          path: /events/mock
          cors: true

  checkoutTicket:
    handler: src/functions/tickets.checkout
    events:
      - httpApi:
          method: POST
          path: /tickets/checkout
          cors: true

  myTickets:
    handler: src/functions/tickets.myTickets
    events:
