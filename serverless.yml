          cors: true

  getTodayDevotional:
    handler: src/functions/devotionals.getTodayDevotional
    events:
      - httpApi:
          method: GET
          path: /devotionals/today
          cors: true

  createOrUpdateDevotional:
    handler: src/functions/devotionals.createOrUpdateDevotional
    events:
      - httpApi:
          method: POST
          path: /devotionals
          cors: true

  deleteDevotional:
    handler: src/functions/devotionals.deleteDevotional
    events:
      - httpApi:
          method: DELETE
          path: /devotionals/{id}
          cors: true
          
  saveUserNote:
    handler: src/functions/devotionals.saveUserNote
    events:
      - httpApi:
          method: POST
          path: /devotionals/notes
          cors: true
